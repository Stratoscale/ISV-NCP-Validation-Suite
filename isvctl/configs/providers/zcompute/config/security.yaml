# zCompute Security Validation Configuration
#
# Imports the provider-agnostic security suite and wires up zCompute-specific scripts.
#
# Coverage (BMC checks excluded — zCompute is a VM cloud with no BMC layer):
#   SEC14-01: API endpoint isolation (ApiEndpointIsolationCheck)
#   SEC07-01: MFA enforcement (MfaEnforcedCheck)
#   SEC09-01: Certificate rotation cycle (CertRotationCycleCheck)
#   SEC09-02: Provider- and customer-managed KMS options (KmsEncryptionOptionCheck)
#   SEC09-03: Centralized KMS (CentralizedKmsCheck)
#   SEC09-04: Customer-managed keys / BYOK (CustomerManagedKeyCheck)
#   SEC03-01: Service account credentials (ServiceAccountCredentialCheck)
#   SEC01-01: OIDC user authentication (OidcUserAuthCheck)
#   SEC02-01: Short-lived credentials/tokens (ShortLivedCredentialsCheck)
#   SEC04-01: Least-privilege access policies (LeastPrivilegePolicyCheck)
#   SEC04-02: Minimal role out-of-scope denial (MinimalRoleEnforcementCheck)
#   SEC08-01: Management API audit-log entry metadata (AuditLogEntryCheck)
#   SEC08-02: Audit-log retention >= 30 days (AuditLogRetentionCheck)
#   SEC11-01: Hard tenant isolation across network/data/compute/storage (TenantIsolationCheck)
#
# Excluded (zCompute is a VM cloud — no BMC/IPMI/Redfish layer):
#   SEC12-01: BmcManagementNetworkCheck
#   SEC12-02: BmcTenantIsolationCheck
#   CNP10-01: BmcProtocolSecurityCheck
#   SEC12-03: BmcBastionAccessCheck
#
# Usage:
#   export ZCOMPUTE_BASE_URL=https://172.29.0.20
#   export AWS_ACCESS_KEY_ID=<key>
#   export AWS_SECRET_ACCESS_KEY=<secret>
#   export AWS_REGION=symphony
#
#   uv run isvctl test run -f isvctl/configs/providers/zcompute/config/security.yaml

import:
  - ../../../suites/security.yaml

version: "1.0"

commands:
  security:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: preflight
        phase: setup
        command: "echo"
        args: ["{\"success\": true, \"platform\": \"security\", \"test_name\": \"preflight\"}"]
        timeout: 10

      - name: api_endpoint_isolation
        phase: test
        command: "python3 ../scripts/security/api_endpoint_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: mfa_enforcement
        phase: test
        command: "python3 ../scripts/security/mfa_enforcement_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: cert_rotation_test
        phase: test
        command: "python3 ../scripts/security/cert_rotation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60
        continue_on_failure: true  # CertRotationCycleCheck is unreleased

      - name: kms_encryption_options_test
        phase: test
        command: "python3 ../scripts/security/kms_encryption_options_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60
        continue_on_failure: true  # KmsEncryptionOptionCheck is unreleased

      - name: centralized_kms_test
        phase: test
        command: "python3 ../scripts/security/centralized_kms_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60
        continue_on_failure: true  # CentralizedKmsCheck is unreleased

      - name: customer_managed_key_test
        phase: test
        command: "python3 ../scripts/security/customer_managed_key_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: sa_credential_test
        phase: test
        command: "python3 ../scripts/security/sa_credential_test.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      - name: oidc_user_auth_test
        phase: test
        command: "python3 ../scripts/security/oidc_user_auth_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: short_lived_credentials_test
        phase: test
        command: "python3 ../scripts/security/short_lived_credentials_test.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      - name: least_privilege_test
        phase: test
        command: "python3 ../scripts/security/least_privilege_test.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      - name: audit_logging_test
        phase: test
        command: "python3 ../scripts/security/audit_logging_test.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      - name: tenant_isolation_test
        phase: test
        command: "python3 ../scripts/security/tenant_isolation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 180

      - name: teardown
        phase: teardown
        command: "python3 ../scripts/security/teardown.py"
        args: ["--region", "{{region}}"]
        timeout: 120

tests:
  cluster_name: "zcompute-security-validation"
  description: "zCompute security hardening validation (VM cloud — BMC checks excluded)"

  settings:
    region: "symphony"

  exclude:
    tests:
      # zCompute is a VM cloud — no BMC/IPMI/Redfish hardware management layer
      - BmcManagementNetworkCheck
      - BmcTenantIsolationCheck
      - BmcProtocolSecurityCheck
      - BmcBastionAccessCheck

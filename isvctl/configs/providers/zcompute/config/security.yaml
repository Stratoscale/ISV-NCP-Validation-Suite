# zCompute Security Validation Configuration
#
# Only steps for RELEASED validations that are genuinely supported are included.
#
# Released checks that PASS:
#   SEC14-01: ApiEndpointIsolationCheck        — API on private IP, requires auth
#   SEC07-01: MfaEnforcedCheck                 — cluster-level MFA enforcement enabled
#   SEC03-01: ServiceAccountCredentialCheck    — IAM service account credentials work
#
# Excluded — confirmed platform gaps:
#   BMC checks (4)     — zCompute is a VM cloud, no BMC/IPMI/Redfish layer
#   CustomerManagedKeyCheck — no KMS API; certificate management exists for LB only
#   OidcUserAuthCheck  — only SAML via Okta supported, OIDC not implemented
#
# Usage:
#   export ZCOMPUTE_BASE_URL=https://<zcompute-ip>
#   export AWS_ACCESS_KEY_ID=<key>
#   export AWS_SECRET_ACCESS_KEY=<secret>
#   export AWS_REGION=symphony
#
#   uv run isvctl test run -f isvctl/configs/providers/zcompute/config/security.yaml

import:
  - ../../../suites/security.yaml

version: "1.0"

commands:
  security:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: preflight
        phase: setup
        command: "echo"
        args: ["{\"success\": true, \"platform\": \"security\", \"test_name\": \"preflight\"}"]
        timeout: 10

      - name: api_endpoint_isolation
        phase: test
        command: "python3 ../scripts/security/api_endpoint_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: mfa_enforcement
        phase: test
        command: "python3 ../scripts/security/mfa_enforcement_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: sa_credential_test
        phase: test
        command: "python3 ../scripts/security/sa_credential_test.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      - name: teardown
        phase: teardown
        command: "python3 ../scripts/security/teardown.py"
        args: ["--region", "{{region}}"]
        timeout: 120

tests:
  cluster_name: "zcompute-security-validation"
  description: "zCompute security hardening validation (VM cloud — BMC checks excluded)"

  settings:
    region: "symphony"

  exclude:
    tests:
      # zCompute is a VM cloud — no BMC/IPMI/Redfish hardware management layer
      - BmcManagementNetworkCheck
      - BmcTenantIsolationCheck
      - BmcProtocolSecurityCheck
      - BmcBastionAccessCheck
      # KMS/BYOK API not available — certificate management exists for LB only
      - CustomerManagedKeyCheck
      # OIDC not implemented — only SAML via Okta supported
      - OidcUserAuthCheck

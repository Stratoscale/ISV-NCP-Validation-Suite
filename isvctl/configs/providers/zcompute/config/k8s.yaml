# zcompute EKS-D Kubernetes Validation Configuration
#
# Targets a pre-deployed EKS-D (Amazon EKS Distro) v1.35.2 cluster on zcompute.
# The cluster is static — setup/teardown scripts query it, they do not provision it.
#
# Cluster topology:
#   - 1 control-plane node  (eksd)
#   - 2 CPU worker nodes    (eksd-worker-0, eksd-worker-1)
#   - 2 GPU worker nodes    (eksd-gpu-worke-0, eksd-gpu-worker-1, 8× H100 SXM5 80GB each)
#
# GPU Operator: zadara-system namespace (deployed via zadara-vm-chart), driver 575.57.08
# Storage:      ebs-sc (block, ebs.csi.aws.com — zcompute AWS-compatible EBS)
# CNI:          Cilium
#
# Usage:
#   export KUBECONFIG=path/to/config-eksd-<cluster-name>
#   export PYTHONPATH=isvctl/src:isvtest/src:isvreporter/src
#   uv run isvctl test run -f isvctl/configs/providers/zcompute/config/k8s.yaml -v
#
# Optional (to enable NIM tests):
#   export NGC_API_KEY=<your_key>

import:
  - ../../../suites/k8s.yaml

version: "1.0"

commands:
  kubernetes:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "../scripts/k8s/setup.sh"
        output_schema: cluster
        timeout: 120

      - name: create_test_node_pool
        phase: setup
        command: "../scripts/k8s/create_node_pool.sh"
        output_schema: node_pool
        timeout: 60
        env:
          TF_VAR_test_pool_name: "isv-test-pool"
          TF_VAR_test_pool_instance_types: '["m6i.large"]'
          TF_VAR_test_pool_desired_size: "1"
          TF_VAR_test_pool_labels_json: '{"isv.ncp.validation/workload":"data-ingest"}'
          TF_VAR_test_pool_taints_json: '[{"key":"isv.ncp.validation/dedicated","value":"test","effect":"NoSchedule"}]'
          TF_VAR_test_pool_node_type: "cpu"

      - name: update_test_node_pool
        phase: test
        command: "../scripts/k8s/create_node_pool.sh"
        output_schema: node_pool
        timeout: 60
        env:
          NODE_POOL_ACTION: "Updating"
          TF_VAR_test_pool_name: "isv-test-pool"
          TF_VAR_test_pool_instance_types: '["m6i.large"]'
          TF_VAR_test_pool_desired_size: "2"
          TF_VAR_test_pool_labels_json: '{"isv.ncp.validation/workload":"data-ingest"}'
          TF_VAR_test_pool_taints_json: '[{"key":"isv.ncp.validation/dedicated","value":"test","effect":"NoSchedule"}]'
          TF_VAR_test_pool_node_type: "cpu"

      - name: pre_test_cleanup
        phase: test
        command: "../scripts/k8s/pre_test_cleanup.sh"
        timeout: 30
        # Deletes Completed/Failed pods that hold nvidia.com/gpu resources permanently:
        #   - nvidia-cuda-validator-* in zadara-system (GPU Operator init pods, never auto-GC'd)
        #   - Any stale isvtest-* / NCCL / NIM pods from previous/interrupted runs
        # Without this, NCCL and GPU stress workloads cannot acquire 8 GPUs per node.

      - name: destroy_test_node_pool
        phase: teardown
        command: "../scripts/k8s/destroy_node_pool.sh"
        timeout: 60

      - name: teardown
        phase: teardown
        command: "../scripts/k8s/teardown.sh"
        timeout: 60

tests:
  description: "zcompute EKS-D GPU cluster validation (K8s v1.35.2, 2× 8× H100 SXM5)"

  validations:
    k8s_workloads:
      checks:
        K8sNcclMultiNodeWorkload:
          # All 8 RoCE NICs + NVSwitch (NVLS tree). Measured peak: ~454 GB/s.
          min_bus_bw_gbps: 350
          # Workers take 3-4 min to start (GPU device plugin reclaims resources from the
          # just-completed single-node NCCL pod) + ~80s for apt-get install openssh-server.
          # Default 300s is not enough; 600s covers the full startup window comfortably.
          startup_timeout: 600

        K8sGpuStressWorkload:
          # gpu-worker-1 runs after NCCL; GPU device plugin needs extra time to reclaim.
          # Default 300s is too tight — raise to 600s.
          timeout: 600

        K8sNimHelmWorkload-3b:
          # Override suite default (gpu_per_node=8) — NIM 3b with 8× H100 on zCompute
          # tries tensor parallelism which fails (engine profile not found or NVLink/IMEX
          # initialization issue). Single-GPU deployment works correctly on H100 SXM5 80GB.
          gpu_count: 1

    kubernetes:
      checks:
        K8sNodeCountCheck:
          count: "{{ steps.setup.kubernetes.node_count | default(4, true) }}"
        K8sGpuCapacityCheck:
          resource_name: "nvidia.com/gpu"
          expected_per_node: 8
          expected_total: 16
        K8sMigConfigCheck:
          require_mig: false
          expected_labels:
            "nvidia.com/mig.capable": "true"
            "nvidia.com/mig.strategy": "single"

  exclude:
    tests:
      # Static cluster — no managed node pool API
      - K8sNodePoolCheck

      # Requires an external (out-of-allow-list) vantage point to probe from
      - K8sApiNetworkAclCheck

      # CNCF conformance is a long-running suite (hours) — run separately
      - K8sCncfConformanceCheck

      # cluster-autoscaler in zadara-system is CrashLoopBackOff (not needed for NCP validation)
      # Remove this exclusion once cluster-autoscaler is fixed or removed
      - K8sNoErrorPodsCheck

      # NIM workloads enabled — requires NGC_API_KEY to be set in environment

      # K8sGpuStressWorkload is NOT excluded but requires the pytorch image to be
      # pre-pulled on both GPU nodes (see CLUSTER-SETUP.md §12). The pre-pull
      # DaemonSet must remain running during the test suite — do NOT delete it
      # before the suite completes. If the workload still fails with empty logs,
      # check CuPy availability: kubectl run cupy-check --rm -i --restart=Never
      #   --image=nvcr.io/nvidia/pytorch:25.04-py3 -n default
      #   --overrides='{"spec":{"nodeSelector":{"nvidia.com/gpu.present":"true"},
      #     "tolerations":[{"operator":"Exists"}],"runtimeClassName":"nvidia",
      #     "containers":[{"name":"t","image":"nvcr.io/nvidia/pytorch:25.04-py3",
      #     "command":["python3","-c","import cupy; print(cupy.__version__)"],
      #     "resources":{"limits":{"nvidia.com/gpu":"1"}}}]}}'

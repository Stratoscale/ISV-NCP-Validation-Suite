# zcompute Control Plane Validation Configuration
#
# Imports the provider-agnostic control-plane test suite and wires up
# zcompute-specific scripts. All scripts use ZCOMPUTE_ENDPOINT to redirect
# boto3 calls to the zcompute API instead of real AWS endpoints.
#
# Tests:
#   - API Health:         STS/EC2/IAM endpoint reachability
#   - Access Key Lifecycle: Create -> authenticate -> disable -> verify rejected -> delete
#   - Tenant Lifecycle:   Create -> list -> get info -> delete
#                         (implemented via IAM Groups; zcompute has no resource-groups API)
#
# Usage:
#   export ZCOMPUTE_ENDPOINT=https://api.yourzone.zadarastorage.com
#   export AWS_ACCESS_KEY_ID=<your_key>
#   export AWS_SECRET_ACCESS_KEY=<your_secret>
#   export AWS_REGION=<your_region>
#   uv run isvctl test run -f isvctl/configs/providers/zcompute/config/control-plane.yaml
#
# Required zcompute permissions:
#   sts:GetCallerIdentity
#   iam:ListUsers, iam:CreateUser, iam:DeleteUser
#   iam:CreateAccessKey, iam:DeleteAccessKey, iam:UpdateAccessKey
#   iam:CreateGroup, iam:DeleteGroup, iam:GetGroup, iam:ListGroups
#   ec2:DescribeRegions

import:
  - ../../../suites/control-plane.yaml

version: "1.0"

commands:
  control_plane:
    phases: ["setup", "test", "teardown"]
    steps:
      # =======================================================================
      # SETUP: API Health Check
      # =======================================================================
      - name: check_api
        phase: setup
        command: "python3 ../scripts/control-plane/check_api.py"
        args: ["--region", "{{region}}", "--services", "{{services}}"]
        timeout: 120

      # =======================================================================
      # SETUP: Create Resources
      # =======================================================================
      - name: create_access_key
        phase: setup
        command: "python3 ../scripts/control-plane/create_access_key.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: create_tenant
        phase: setup
        command: "python3 ../scripts/control-plane/create_tenant.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # =======================================================================
      # TEST: Access Key Lifecycle
      # =======================================================================
      - name: test_access_key
        phase: test
        command: "python3 ../scripts/control-plane/test_access_key.py"
        args:
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--secret-access-key"
          - "{{steps.create_access_key.secret_access_key}}"
          - "--region"
          - "{{region}}"
          - "--wait"
          - "5"
          - "--retries"
          - "5"
        sensitive_args: ["--secret-access-key"]
        timeout: 120

      - name: disable_access_key
        phase: test
        command: "python3 ../scripts/control-plane/disable_access_key.py"
        args:
          - "--username"
          - "{{steps.create_access_key.username}}"
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60
        # zcompute: iam:UpdateAccessKey is not implemented (NotImplementedException).
        # Step is kept so teardown still has the key ID, but failure is non-blocking.
        continue_on_failure: true

      - name: verify_key_rejected
        phase: test
        command: "python3 ../scripts/control-plane/verify_key_rejected.py"
        args:
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--secret-access-key"
          - "{{steps.create_access_key.secret_access_key}}"
          - "--region"
          - "{{region}}"
          - "--wait"
          - "5"
          - "--retries"
          - "5"
        sensitive_args: ["--secret-access-key"]
        timeout: 120
        # zcompute: disable step above fails, so key is never actually inactive.
        # This step is kept for completeness but cannot pass.
        continue_on_failure: true

      # =======================================================================
      # TEST: Tenant Lifecycle
      # =======================================================================
      - name: list_tenants
        phase: test
        command: "python3 ../scripts/control-plane/list_tenants.py"
        args:
          - "--region"
          - "{{region}}"
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
        timeout: 60

      - name: get_tenant
        phase: test
        command: "python3 ../scripts/control-plane/get_tenant.py"
        args:
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # =======================================================================
      # TEARDOWN: Cleanup Resources
      # =======================================================================
      - name: delete_access_key
        phase: teardown
        command: "python3 ../scripts/control-plane/delete_access_key.py"
        args:
          - "--username"
          - "{{steps.create_access_key.username}}"
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60
        output_schema: teardown

      - name: delete_tenant
        phase: teardown
        command: "python3 ../scripts/control-plane/delete_tenant.py"
        args:
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
          - "--region"
          - "{{region}}"
        timeout: 60
        output_schema: teardown

tests:
  cluster_name: "zcompute-control-plane-validation"
  description: "zcompute control plane: API health, access key lifecycle, tenant lifecycle"

  settings:
    region: "symphony"
    services: "ec2,iam,sts"

  exclude:
    # Un-exclude once symp CLI is confirmed working on the test VM.
    # disable_access_key.py now falls back to: symp access-key update <id> False
    # Requires: SYMP_URL, SYMP_USER, SYMP_DOMAIN, SYMP_PASSWORD env vars
    tests:
      - AccessKeyDisabledCheck
      - AccessKeyRejectedCheck

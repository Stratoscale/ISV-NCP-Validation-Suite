apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-allreduce-multinode
spec:
  slotsPerWorker: 4
  launcherCreationPolicy: WaitForWorkersReady
  runPolicy:
    cleanPodPolicy: Running
  sshAuthMountPath: /root/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          containers:
            - name: launcher
              image: nvcr.io/nvidia/hpc-benchmarks:25.04
              command:
                - /bin/bash
                - -c
                - |
                  # MPI Operator mounts SSH keys read-only; copy to fix permissions
                  cp /root/.ssh/id_rsa /tmp/id_rsa && chmod 600 /tmp/id_rsa
                  # Note: '-np 8' is overridden at runtime by K8sNcclMultiNodeWorkload
                  exec mpirun --allow-run-as-root \
                    -np 8 \
                    --bind-to none --map-by slot \
                    -mca plm_rsh_args "-o StrictHostKeyChecking=no -o IdentityFile=/tmp/id_rsa" \
                    -x NCCL_DEBUG=INFO -x LD_LIBRARY_PATH \
                    -x NCCL_IB_DISABLE -x NCCL_IB_HCA -x NCCL_IB_GID_INDEX -x NCCL_NET_GDR_LEVEL \
                    -x UCX_TLS=tcp,sm,cuda_copy,cuda_ipc \
                    -x OMPI_MCA_coll_hcoll_enable \
                    /usr/local/bin/all_reduce_perf_mpi -b 8 -e 4G -f 2 -g 1
              env:
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_IB_HCA
                  value: "^rocep75s0,mlx5_1,mlx5_2,mlx5_5,mlx5_6"  # exclude-list: rocep75s0 (dup IP) + mlx5_1/2/5/6 (ibv_modify_qp ENODEV); leaves 4 NICs (mlx5_0,3,4,7)
                - name: NCCL_IB_GID_INDEX
                  value: "3"           # RoCE v2 — valid unique IPs on the remaining NICs
                - name: NCCL_NET_GDR_LEVEL
                  value: "0"           # host-bounce buffers; set to 2 only if nvidia_peermem is loaded
                - name: OMPI_MCA_coll_hcoll_enable
                  value: "0"           # disable HCOLL; with 4 NICs HCOLL's 8-NIC requirement causes MPI_Init exit code 3
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
    Worker:
      replicas: 2
      template:
        spec:
          containers:
            - name: worker
              image: nvcr.io/nvidia/hpc-benchmarks:25.04
              command:
                - /bin/bash
                - -c
                - |
                  # Pre-warm host ARP table for all IB NIC IPs on both nodes.
                  # ibv_modify_qp (RTR) fails with ENODEV if the host kernel has no
                  # neighbor entry for the remote GID's IP. We ping all known IB NIC
                  # IPs from the host network namespace to populate the ARP cache.
                  nsenter --net=/proc/1/ns/net /bin/bash -c "
                    for ip in 10.20.0.0 10.20.0.4 10.20.0.8 10.20.0.12 \
                               10.20.0.16 10.20.0.20 10.20.0.24 10.20.0.28 \
                               10.22.0.0 10.22.0.4 10.22.0.8 10.22.0.12 \
                               10.22.0.16 10.22.0.20 10.22.0.24 10.22.0.28; do
                      ping -c 2 -W 1 \$ip >/dev/null 2>&1 || true
                    done
                  " || true
                  command -v sshd >/dev/null || { apt-get update -qq && apt-get install -y -qq openssh-server >/dev/null 2>&1; }
                  mkdir -p /var/run/sshd && ssh-keygen -A 2>/dev/null && exec /usr/sbin/sshd -De -o PermitRootLogin=yes -o StrictModes=no
              readinessProbe:
                tcpSocket:
                  port: 22
                initialDelaySeconds: 2
                periodSeconds: 3
              env:
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_IB_HCA
                  value: "^rocep75s0,mlx5_1,mlx5_2,mlx5_5,mlx5_6"  # exclude-list: rocep75s0 (dup IP) + mlx5_1/2/5/6 (ibv_modify_qp ENODEV); leaves 4 NICs (mlx5_0,3,4,7)
                - name: NCCL_IB_GID_INDEX
                  value: "3"           # RoCE v2 — valid unique IPs on the remaining NICs
                - name: NCCL_NET_GDR_LEVEL
                  value: "0"           # host-bounce buffers; set to 2 only if nvidia_peermem is loaded
                - name: OMPI_MCA_coll_hcoll_enable
                  value: "0"           # disable HCOLL; with 4 NICs HCOLL's 8-NIC requirement causes MPI_Init exit code 3
              securityContext:
                privileged: true       # required to open /dev/infiniband/uverbs* (cgroup device whitelist)
              resources:
                limits:
                  nvidia.com/gpu: 4 # overridden at runtime by K8sNcclMultiNodeWorkload
              volumeMounts:
                - name: shm
                  mountPath: /dev/shm
                - name: infiniband
                  mountPath: /dev/infiniband
          nodeSelector:
            nvidia.com/gpu.present: "true"
          runtimeClassName: nvidia
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
          volumes:
            - name: infiniband
              hostPath:
                path: /dev/infiniband  # exposes host RoCE/IB verbs devices without a device plugin
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 8Gi
